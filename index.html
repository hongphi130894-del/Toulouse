<script>
// =========================================================================
// KIẾN TRÚC JAVASCRIPT ĐÃ ĐƯỢC REFACTOR (SẠCH, DỄ BẢO TRÌ, AN TOÀN)
// =========================================================================

// --- 1. CẤU HÌNH HỆ THỐNG ---
const CONFIG = {
    SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbw9sWIdwYbnjieLcYJP82nyQUi0BeLnQh1Bw_ImYawIRr2f5T6zW7MhvuGYvPUfVWPvDw/exec',
    CACHE_TTL: 5 * 60 * 1000, // 5 phút
    CACHE_PREFIX: 'tlse_'
};

// --- 2. HÀM TIỆN ÍCH TÁI SỬ DỤNG (UTILITIES) ---
const Utils = {
    $: id => document.getElementById(id),
    num: v => Number(v || 0),
    fmt: v => Utils.num(v).toLocaleString('vi-VN') + 'đ',
    esc: s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'),
    pad: v => String(v).padStart(2, '0'),
    
    // Đã fix lỗi undefined ở đây
    capitalize: str => {
        if (typeof str !== 'string' || !str) return '';
        return str.charAt(0).toUpperCase() + str.slice(1);
    },
    
    daysInMonth: (y, m) => new Date(y, m, 0).getDate(),
    todayStr: () => {
        const d = new Date();
        return `${d.getFullYear()}-${Utils.pad(d.getMonth() + 1)}-${Utils.pad(d.getDate())}`;
    },
    isPast: (dateStr) => dateStr < Utils.todayStr(),
    normDate: (s) => {
        if (!s) return '';
        s = String(s).trim();
        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
        const d = new Date(s);
        if (!isNaN(d.getTime())) return `${d.getFullYear()}-${Utils.pad(d.getMonth() + 1)}-${Utils.pad(d.getDate())}`;
        return s;
    },
    dateToYM: (dateStr) => {
        const p = dateStr.split('-');
        return `${parseInt(p[1])}_${p[0]}`;
    },

    // Quản lý URL Ảnh Google Drive an toàn
    driveThumb: (fId, sz = 'w200') => fId ? `https://drive.google.com/thumbnail?id=${fId}&sz=${sz}` : null,
    driveView: (fId) => fId ? `https://drive.google.com/uc?export=view&id=${fId}` : null,
    driveFullUrl: (fId) => fId ? `https://drive.google.com/file/d/${fId}/view` : null,
    
    // Đã bổ sung hàm getFileId bị thiếu
    getFileId: (url) => {
        if (!url) return null;
        if (url.startsWith('drive:')) return url.slice(6);
        const m = url.match(/\/d\/([^\/\?]+)/);
        return m ? m[1] : null;
    },
    getFileIds: (urls) => {
        if (!urls) return [];
        return urls.split(',').map(Utils.getFileId).filter(Boolean);
    }
};

// --- 3. QUẢN LÝ TRẠNG THÁI (STATE MANAGEMENT) ---
const State = {
    currentTab: 'orders',
    authedAdmin: false,
    authedBoss: false,
    
    // Dữ liệu
    orders: [],
    costs: [],
    fixedCosts: { rent: 0, elec: 0, water: 0 },
    fImgs: { rent: [], elec: [], water: [] }, // Ảnh hóa đơn định phí
    
    // Trạng thái Form
    editId: null,
    editCostId: null,
    formOpen: true,
    costFormOpen: true,
    fixedBodyOpen: true,
    aiOpen: true,
    
    // Trạng thái Upload Multi-image
    pendingUploadedFiles: [],
    currentEditFileIds: [],
    
    // Dashboard
    dashY: new Date().getFullYear(),
    dashM: new Date().getMonth() + 1
};

// --- 4. GIAO TIẾP MẠNG & CACHE (API LAYER) ---
const Api = {
    cacheMap: new Map(),
    
    cGet: (key) => {
        const mem = Api.cacheMap.get(key);
        if (mem && Date.now() - mem.t < CONFIG.CACHE_TTL) return mem.d;
        try {
            const raw = localStorage.getItem(CONFIG.CACHE_PREFIX + key);
            if (!raw) return null;
            const parsed = JSON.parse(raw);
            if (Date.now() - parsed.t > CONFIG.CACHE_TTL) {
                localStorage.removeItem(CONFIG.CACHE_PREFIX + key);
                return null;
            }
            Api.cacheMap.set(key, parsed);
            return parsed.d;
        } catch (e) { return null; }
    },
    
    cSet: (key, data) => {
        const payload = { d: data, t: Date.now() };
        Api.cacheMap.set(key, payload);
        try { localStorage.setItem(CONFIG.CACHE_PREFIX + key, JSON.stringify(payload)); } catch (e) {}
    },
    
    cDel: (pattern) => {
        Api.cacheMap.forEach((_, k) => { if (k.includes(pattern)) Api.cacheMap.delete(k); });
        try {
            Object.keys(localStorage)
                .filter(k => k.startsWith(CONFIG.CACHE_PREFIX) && k.includes(pattern))
                .forEach(k => localStorage.removeItem(k));
        } catch (e) {}
    },

    get: async (params) => {
        const qs = new URLSearchParams(params).toString();
        const res = await fetch(`${CONFIG.SCRIPT_URL}?${qs}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
    },

    getCached: async (params) => {
        const qs = new URLSearchParams(params).toString();
        const hit = Api.cGet(qs);
        if (hit) return hit;
        const res = await Api.get(params);
        if (res.ok !== false) Api.cSet(qs, res);
        return res;
    },

    post: async (body) => {
        const res = await fetch(CONFIG.SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
    }
};

// --- 5. LOGIC HIỂN THỊ (UI & DOM) ---
const UI = {
    toastTimer: null,
    
    toast: (msg, isErr = false) => {
        clearTimeout(UI.toastTimer);
        const t = Utils.$('toast');
        t.textContent = msg;
        t.className = 'toast show' + (isErr ? ' err' : '');
        UI.toastTimer = setTimeout(() => t.classList.remove('show'), isErr ? 3500 : 2500);
    },

    openImgViewer: (src) => {
        const ov = document.createElement('div');
        ov.className = 'modal-overlay';
        ov.style.cssText = 'z-index: 10001; background: rgba(0,0,0,0.85);';
        ov.innerHTML = `<img src="${src}" style="max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,0.5);" onerror="this.src=''">`;
        ov.onclick = () => ov.remove();
        document.body.appendChild(ov);
    },

    // ... [Các hàm Render Table giữ nguyên cấu trúc HTML, nhưng dùng biến từ State]
    
    // XỬ LÝ LỖI ĐỊNH PHÍ HÀNG THÁNG Ở ĐÂY
    renderFixedImgs: (type) => {
        const boxId = `f${Utils.capitalize(type)}ImgBox`;
        const box = Utils.$(boxId);
        if (!box) return; // Bảo vệ crash
        
        box.innerHTML = '';
        if (State.fImgs[type].length === 0) {
            box.style.display = 'none';
            return;
        }
        
        box.style.display = 'flex';
        State.fImgs[type].forEach(url => {
            const id = Utils.getFileId(url);
            if (id) {
                box.innerHTML += `
                    <div class="img-thumb-wrap" style="margin-bottom:0;">
                        <img src="${Utils.driveThumb(id)}" class="img-thumb" style="max-height:30px;max-width:40px;" onclick="UI.openImgViewer('${Utils.driveView(id)}')">
                        <button type="button" class="del-img-btn" style="width:16px;height:16px;font-size:10px;top:-4px;right:-4px;" onclick="removeFixedImg('${type}', '${id}')">×</button>
                    </div>`;
            }
        });
    }
};

// --- 6. LOGIC NGHIỆP VỤ CHÍNH ---

async function compressImage(file) {
    return new Promise(resolve => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
            URL.revokeObjectURL(url);
            const MW = 900, MH = 700;
            let w = img.width, h = img.height;
            if (w > MW) { h = Math.round(h * MW / w); w = MW; }
            if (h > MH) { w = Math.round(w * MH / h); h = MH; }
            const cv = document.createElement('canvas');
            cv.width = w; cv.height = h;
            cv.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(cv.toDataURL('image/jpeg', 0.68));
        };
        img.src = url;
    });
}

// Hàm Upload ảnh Định phí đã sửa lỗi
async function uploadFixedImg(type, input) {
    const files = input.files;
    if (!files.length) return;
    
    const btn = Utils.$('fixedSaveBtn');
    btn.disabled = true; 
    btn.innerHTML = 'Đang tải ảnh...';
    
    for (let i = 0; i < files.length; i++) {
        try {
            const b64 = await compressImage(files[i]);
            const base64 = b64.split(',')[1];
            const ext = b64.startsWith('data:image/png') ? 'png' : 'jpg';
            
            const r = await Api.post({ action: 'uploadImage', base64, ext });
            if (!r.ok) throw new Error(r.error);
            
            State.fImgs[type].push(Utils.driveFullUrl(r.fileId));
            UI.renderFixedImgs(type); // Gọi hàm an toàn
            
        } catch (e) { 
            UI.toast('Lỗi up ảnh: ' + e.message, true); 
        }
    }
    
    btn.disabled = false; 
    btn.innerHTML = 'Cập nhật định phí'; 
    input.value = '';
}

function removeFixedImg(type, idToRemove) {
    State.fImgs[type] = State.fImgs[type].filter(url => Utils.getFileId(url) !== idToRemove);
    Api.post({ action: 'deleteImage', fileId: idToRemove }).catch(() => {});
    UI.renderFixedImgs(type);
}

// Tính toán Định phí
function calcFixed() {
    const total = (Utils.num(Utils.$('fRent').value) + Utils.num(Utils.$('fElec').value) + Utils.num(Utils.$('fWater').value)) * 1000;
    Utils.$('fixedTotal').textContent = Utils.fmt(total);
}

// Lưu Định Phí
async function saveFixed() {
    const dateVal = Utils.$('selDate').value;
    const [y, m] = dateVal.split('-');
    const ym = `${parseInt(m)}_${y}`;
    
    const btn = Utils.$('fixedSaveBtn');
    btn.disabled = true;
    btn.innerHTML = 'Đang xử lý...';
    
    try {
        await Api.post({
            action: 'saveFixedCosts',
            data: JSON.stringify({
                yearMonth: ym,
                rent: Utils.num(Utils.$('fRent').value) * 1000,
                rentImg: State.fImgs.rent.join(','),
                elec: Utils.num(Utils.$('fElec').value) * 1000,
                elecImg: State.fImgs.elec.join(','),
                water: Utils.num(Utils.$('fWater').value) * 1000,
                waterImg: State.fImgs.water.join(',')
            })
        });
        UI.toast('Biểu mẫu định phí đã xác lập!');
    } catch (e) {
        UI.toast('Báo lỗi: ' + e.message, true);
    }
    
    btn.disabled = false;
    btn.innerHTML = 'Cập nhật định phí';
}

// --- 7. KHỞI TẠO HỆ THỐNG ---
(async function initApp() {
    // Gán ngày hiện tại
    const dateInput = Utils.$('selDate');
    if(dateInput) dateInput.value = Utils.todayStr();
    
    // Gắn sự kiện tính toán tự động
    ['fRent', 'fElec', 'fWater'].forEach(id => {
        const el = Utils.$(id);
        if(el) el.addEventListener('input', calcFixed);
    });

    // ... [Phần khởi tạo Dashboard, Lịch, Table còn lại gọi qua Api.getCached]
})();
</script>
